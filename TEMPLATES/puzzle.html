<style>
    /* THE INFINITE JIGSAW BOARD (4 Columns) */
    .true-jigsaw-board {
        display: flex;
        flex-wrap: wrap;
        width: 710px; /* Thoda width badhaya taaki naye gaps fit ho sakein */
        justify-content: center;
        max-width: 100%;
        margin: 40px auto;
        filter: drop-shadow(0 15px 25px rgba(0,0,0,0.15));
    }

    .puzzle-part {
        position: relative;
        flex: 0 0 200px; 
        height: 200px;
        /* YAHAN HAI MAGIC: -40px ki jagah -32px kiya hai taaki thoda gap aa jaye */
        margin-right: -32px;  
        margin-bottom: -32px; 
        cursor: pointer;
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.3s ease;
        filter: brightness(0.95); /* Thoda bright rakha hai base state ko */
        z-index: 1;
    }

    /* Resets the margin for the 4th, 8th, 12th piece so the grid drops to the next line perfectly */
    .puzzle-part:nth-child(4n) {
        margin-right: 0;
    }

    .puzzle-part img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* Pop out effect on hover */
    .puzzle-part:hover {
        z-index: 50; 
        transform: scale(1.08) translateY(-5px);
        filter: brightness(1.15) drop-shadow(0 15px 20px rgba(0,0,0,0.5));
    }

    .part-label {
        position: absolute;
        top: 25px; left: 25px; right: 25px; bottom: 25px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(10, 76, 114, 0.85); /* Theme color */
        color: white;
        font-size: 1.2rem;
        font-weight: 800;
        letter-spacing: 1px;
        opacity: 0;
        transition: opacity 0.3s ease;
        pointer-events: none;
        border-radius: 8px;
    }

    .puzzle-part:hover .part-label { opacity: 1; }

    /* The 8 Infinite Shapes */
    .r1-c1 { clip-path: url(#r1-c1); } .r1-c2 { clip-path: url(#r1-c2); } 
    .r1-c3 { clip-path: url(#r1-c3); } .r1-c4 { clip-path: url(#r1-c4); }
    .mid-c1 { clip-path: url(#mid-c1); } .mid-c2 { clip-path: url(#mid-c2); } 
    .mid-c3 { clip-path: url(#mid-c3); } .mid-c4 { clip-path: url(#mid-c4); }

    .missing-piece {
        flex: 0 0 200px; 
        height: 200px;
        display: flex;
        align-items: center; justify-content: center;
        color: #999; font-style: italic; font-weight: bold;
        padding-left: 20px;
    }
</style>
